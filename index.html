<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rasa in 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Söhne';
      src: url('assets/fonts/Söhne-Buch.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Söhne';
      src: url('assets/fonts/Söhne-Kräftig.otf') format('opentype');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Söhne';
      src: url('assets/fonts/Söhne-Dreiviertelfett.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080327;
      --bg-surface: rgba(255,255,255,0.04);
      --bg-surface-hover: rgba(255,255,255,0.07);
      --purple: #5a17ee;
      --lilac: #A6AAF3;
      --lilac-pale: #DADCFB;
      --aqua: #71EFF3;
      --text: #eeeef2;
      --text-dim: rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.25);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --display: 'Söhne', -apple-system, sans-serif;
      --body: 'Söhne', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Ambient background ────────────────────── */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 900px;
      background: radial-gradient(ellipse, rgba(90,23,238,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── Nav ───────────────────────────────────── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2rem 0;
    }

    .nav-logo svg {
      height: 24px;
      width: auto;
      opacity: 0.7;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .nav-link:hover { color: var(--lilac); }

    /* ── Hero ──────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 5rem 0 4rem;
    }

    .hero-title {
      font-family: var(--display);
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 1.25rem;
    }

    .hero-subtitle {
      font-family: var(--body);
      font-size: 1.125rem;
      font-weight: 300;
      color: var(--text-dim);
      margin-bottom: 2.5rem;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--body);
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--purple);
      border: none;
      border-radius: 8px;
      padding: 0.875rem 2rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 0 0 0 rgba(90,23,238,0);
    }

    .hero-cta:hover {
      background: #6b2bf5;
      box-shadow: 0 4px 24px rgba(90,23,238,0.4);
      transform: translateY(-1px);
    }

    .hero-cta svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Video Grid ────────────────────────────── */
    .videos-section {
      padding: 2rem 0 6rem;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.6875rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }

    /* ── Video Card ────────────────────────────── */
    .video-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .video-card:hover {
      background: var(--bg-surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .video-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,0.02);
      overflow: hidden;
    }

    .video-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(90,23,238,0.08) 0%, rgba(90,23,238,0.02) 100%);
    }

    .video-thumb-placeholder svg {
      width: 32px;
      height: 32px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    /* Play overlay */
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .video-card:hover .play-overlay {
      opacity: 1;
    }

    .play-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
    }

    .video-card:hover .play-btn {
      background: rgba(255,255,255,0.2);
      transform: scale(1.05);
    }

    .play-btn svg {
      width: 20px;
      height: 20px;
      fill: #fff;
      margin-left: 2px;
    }

    .video-info {
      padding: 1rem 1.125rem 1.25rem;
    }

    .video-tag {
      font-family: var(--mono);
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--lilac);
      margin-bottom: 0.375rem;
    }

    .video-name {
      font-family: var(--body);
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 0.25rem;
    }

    .video-duration {
      font-family: var(--mono);
      font-size: 0.6875rem;
      color: var(--text-muted);
    }

    .video-coming-soon {
      font-family: var(--mono);
      font-size: 0.625rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* ── Lightbox ──────────────────────────────── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-inner {
      position: relative;
      width: 90vmin;
      max-width: 720px;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }

    .lightbox-inner video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1001;
      transition: background 0.2s;
    }

    .lightbox-close:hover {
      background: rgba(255,255,255,0.2);
    }

    .lightbox-close svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    /* ── Footer ────────────────────────────────── */
    .footer {
      text-align: center;
      padding: 0 0 3rem;
      color: var(--text-muted);
      font-size: 0.8125rem;
    }

    .footer a {
      color: var(--lilac);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ── Responsive ────────────────────────────── */
    @media (max-width: 640px) {
      .page { padding: 0 1.25rem; }
      .hero { padding: 3rem 0 2.5rem; }
      .hero-title { font-size: 2.75rem; }
      .video-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
      .video-info { padding: 0.75rem 0.875rem 1rem; }
      .lightbox-inner { width: 95vw; }
    }
  </style>
</head>
<body>

  <div class="page">

    <!-- ═══ NAV ═══ -->
    <nav class="nav">
      <a href="https://rasa.com" class="nav-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 287.8 141"><defs><style>.l{fill:#fff;}</style></defs><g><path class="l" d="M209.4,29V79.11h12V64h26V79h12V29Zm38,23h-26V41h26Z"/><polygon class="l" points="198.4 56.5 198.4 69 198.4 79 149.4 79 149.4 67 186.4 67 186.4 60 149.4 60 149.4 49 149.4 36.5 149.4 29 198.4 29 198.4 41 161.4 41 161.4 48 198.4 48 198.4 56.5 198.4 56.5"/><path class="l" d="M88.4,29V79.11h12V64h26V79h12V29Zm38,23h-26V41h26Z"/><path class="l" d="M61.31,59.94l15.36-5.59.73-.29V29h-49V79H40.24V67.59l9-3.26L62.79,79H77.61Zm-21-5.12V41H65.4v4.68Z"/><path class="l" d="M246.05,90.54H270V18.44H17.84v72.1h180L246,114.36V90.54ZM4.4,5h279v99H259.49v32l-64.77-32H4.4Z"/></g></svg>
      </a>
      <a href="https://rasa.com" class="nav-link">rasa.com &rarr;</a>
    </nav>

    <!-- ═══ HERO ═══ -->
    <section class="hero">
      <h1 class="hero-title">Rasa in 2026</h1>
      <p class="hero-subtitle">Book a call with Alan to learn more</p>
      <a href="https://calendar.google.com/calendar/appointments/schedules/AcZssZ2SuCZYTOj30T4IEy_-q0yH2JeO6Z-FyVVTOXUPExWvNVp1zivZrHbdtxaIhpQyhInU3FQn0slr"
         class="hero-cta" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Book a call
      </a>
    </section>

    <!-- ═══ VIDEOS ═══ -->
    <section class="videos-section">
      <div class="section-label">Videos</div>
      <div class="video-grid" id="videoGrid"></div>
    </section>

    <!-- ═══ FOOTER ═══ -->
    <footer class="footer">
      <a href="https://rasa.com">&copy; Rasa Technologies 2026</a>
    </footer>

  </div>

  <!-- ═══ LIGHTBOX ═══ -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="lightbox-inner">
      <video id="lightboxVideo" controls playsinline></video>
    </div>
  </div>

  <script>
    // ── Video Data ──────────────────────────────
    const VIDEOS = [
      {
        id: 'skills',
        title: 'Skills',
        tag: 'Product',
        src: 'assets/videos/Rasa-skills-v2-render.mp4',
        duration: '1:18',
      },
      {
        id: 'memory',
        title: 'Memory',
        tag: 'Product',
        src: 'assets/videos/memory.mp4',
        duration: '1:24',
      },
      {
        id: 'orchestration',
        title: 'Orchestration',
        tag: 'Product',
        src: null,
        duration: '',
        comingSoon: true,
      },
      {
        id: 'multitasking',
        title: 'Multitasking',
        tag: 'Product',
        src: null,
        duration: '',
        comingSoon: true,
      },
    ];

    // ── Build Cards ─────────────────────────────
    const grid = document.getElementById('videoGrid');

    VIDEOS.forEach(video => {
      const card = document.createElement('div');
      card.className = 'video-card';
      if (video.comingSoon) card.style.cursor = 'default';

      const thumbContent = video.src
        ? `<video src="${video.src}" muted playsinline preload="metadata"></video>
           <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div></div>`
        : video.placeholder
          ? `<div class="video-thumb-placeholder">
               <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="none"/></svg>
             </div>
             <div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg></div></div>`
          : `<div class="video-thumb-placeholder">
               <svg viewBox="0 0 24 24"><polygon points="8,5 20,12 8,19" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
             </div>`;

      card.innerHTML = `
        <div class="video-thumb">${thumbContent}</div>
        <div class="video-info">
          ${video.comingSoon
            ? `<div class="video-coming-soon">Coming soon</div>
               <div class="video-name">${video.title}</div>`
            : `${video.tag ? `<div class="video-tag">${video.tag}</div>` : ''}
               <div class="video-name">${video.title}</div>
               ${video.duration ? `<div class="video-duration">${video.duration}</div>` : ''}`
          }
        </div>
      `;

      // Hover preview
      if (video.src) {
        const thumb = card.querySelector('.video-thumb video');
        card.addEventListener('mouseenter', () => { thumb.currentTime = 0; thumb.play().catch(() => {}); });
        card.addEventListener('mouseleave', () => { thumb.pause(); thumb.currentTime = 0; });

        card.addEventListener('click', () => openLightbox(video.src));
      }

      grid.appendChild(card);
    });

    // ── Lightbox ────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxVideo = document.getElementById('lightboxVideo');
    const lightboxClose = document.getElementById('lightboxClose');

    function openLightbox(src) {
      lightboxVideo.src = src;
      lightbox.classList.add('open');
      lightboxVideo.play().catch(() => {});
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      lightboxVideo.pause();
      lightboxVideo.src = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>

</body>
</html>
